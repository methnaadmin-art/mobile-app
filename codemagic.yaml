# =============================================================================
# Codemagic CI/CD configuration for Methna
#
# Two workflows are defined:
#   - ios-release        : builds and publishes to App Store Connect / TestFlight
#   - android-release    : builds an .aab and (optionally) publishes to Play Store
#
# Prerequisites that must be configured in the Codemagic UI before running:
#
# iOS
#   1. Team integrations -> Developer Portal -> add an App Store Connect API key
#      under the integration name "Codemagic Methna".
#   2. Codemagic.yaml settings -> Code signing identities:
#         - Upload an iOS Distribution certificate (.p12) for distribution_type
#           "app_store". Or rely on automatic fetch via App Store Connect API.
#         - Upload a matching App Store provisioning profile for bundle id
#           com.methnapp.app.
#
# Android
#   1. Codemagic.yaml settings -> Environment variables -> create a group named
#      "android_keystore" containing the following secure variables (mark as
#      Secret):
#         CM_KEYSTORE             - base64-encoded contents of release.jks
#         CM_KEYSTORE_PASSWORD    - keystore password
#         CM_KEY_ALIAS            - keystore key alias
#         CM_KEY_PASSWORD         - alias password
#   2. (Optional) Team integrations -> Google Play -> upload the service-account
#      JSON to enable automatic publishing to Internal track.
# =============================================================================

definitions:
  flutter_version: &flutter_version stable
  xcode_version: &xcode_version latest
  cocoapods_version: &cocoapods_version default

workflows:
  # ---------------------------------------------------------------------------
  # iOS App Store / TestFlight workflow
  # ---------------------------------------------------------------------------
  ios-release:
    name: iOS Release (App Store / TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Methna

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.methnapp.app
      vars:
        BUNDLE_ID: "com.methnapp.app"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        IOS_BUILD_NUMBER: "59"
        # Replace with the numeric Apple ID from App Store Connect after the
        # first manual upload. Used to auto-increment the build number.
        APP_STORE_APPLE_ID: 0000000000
      flutter: *flutter_version
      xcode: *xcode_version
      cocoapods: *cocoapods_version

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Set Flutter build number from App Store Connect
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          MIN_IOS_BUILD_NUMBER="${IOS_BUILD_NUMBER:-36}"

          # Git commit count: a monotonic floor that needs no external API
          # and can never go backwards or return stale/zero data. This is
          # the actual fix for two builds in a row (57, then 58) colliding
          # with "previously uploaded version" — both times the number we
          # ended up with was exactly the static floor, which means the
          # app-store-connect lookups below were silently failing (falling
          # through to `|| echo 0`) rather than merely lagging.
          # Ensure full history: a shallow clone would make the commit
          # count below return a constant (the clone depth) instead of a
          # value that grows with every push.
          git fetch --unshallow >/dev/null 2>&1 || true
          GIT_BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "Git commit count: $GIT_BUILD_NUMBER"

          LATEST_BUILD_NUMBER=0
          if [ "$APP_STORE_APPLE_ID" != "0000000000" ]; then
            # get-latest-app-store-build-number only sees builds attached to
            # an App Store version; a build still processing in TestFlight
            # won't show up there yet, so also check TestFlight and take the
            # higher of the two. Output is sanitized to digits only since a
            # failed call may print an error string instead of a number.
            LATEST_APP_STORE_RAW=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>&1 || echo 0)
            LATEST_TESTFLIGHT_RAW=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>&1 || echo 0)
            echo "get-latest-app-store-build-number output: $LATEST_APP_STORE_RAW"
            echo "get-latest-testflight-build-number output: $LATEST_TESTFLIGHT_RAW"
            LATEST_APP_STORE_BUILD=$(echo "$LATEST_APP_STORE_RAW" | grep -oE '[0-9]+' | tail -1)
            LATEST_TESTFLIGHT_BUILD=$(echo "$LATEST_TESTFLIGHT_RAW" | grep -oE '[0-9]+' | tail -1)
            LATEST_BUILD_NUMBER=${LATEST_APP_STORE_BUILD:-0}
            if [ "${LATEST_TESTFLIGHT_BUILD:-0}" -gt "$LATEST_BUILD_NUMBER" ]; then
              LATEST_BUILD_NUMBER=${LATEST_TESTFLIGHT_BUILD:-0}
            fi
            echo "Latest App Store Connect build number (parsed): $LATEST_BUILD_NUMBER"
          else
            echo "APP_STORE_APPLE_ID not set; skipping App Store Connect lookup"
          fi

          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))

          for candidate in "$GIT_BUILD_NUMBER" "$MIN_IOS_BUILD_NUMBER"; do
            if [ "$candidate" -gt "$NEW_BUILD_NUMBER" ]; then
              NEW_BUILD_NUMBER=$candidate
            fi
          done
          echo "Using build number: $NEW_BUILD_NUMBER"
          echo "FLUTTER_BUILD_NUMBER=$NEW_BUILD_NUMBER" >> $CM_ENV

      - name: Flutter precache and dependencies
        script: |
          set -e
          flutter --version
          flutter config --no-enable-swift-package-manager
          rm -rf ios/.swiftpm ios/Runner.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          flutter clean
          flutter precache --ios
          flutter pub get

      - name: Generate native splash screens
        script: |
          set -e
          dart run flutter_native_splash:create

      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install --repo-update

      - name: Initialize keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          set -e
          BUILD_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          flutter build ipa --release \
            --no-tree-shake-icons \
            --build-name="$BUILD_NAME" \
            --build-number="${FLUTTER_BUILD_NUMBER:-36}" \
            --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # External tester groups are optional. Leave empty for internal-only
        # TestFlight distribution; uncomment + replace with a real App Store
        # Connect group name once you've created one.
        # beta_groups:
        #   - Internal Testers
        # Set to true once the listing is fully prepared in App Store Connect
        # and you want every tag-triggered build to go to App Store Review.
        submit_to_app_store: false
      email:
        recipients:
          - methnasupport@gmail.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # Android Play Store workflow
  # ---------------------------------------------------------------------------
  android-release:
    name: Android Release (Play Store AAB)
    max_build_duration: 90
    instance_type: linux_x2

    environment:
      groups:
        - android_keystore
      vars:
        PACKAGE_NAME: "com.methnapp.app"
      flutter: *flutter_version

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'android-v*'
          include: true

    scripts:
      - name: Decode signing keystore
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/android/keystore"
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/keystore/release.jks"
          cat <<EOF > "$CM_BUILD_DIR/android/key.properties"
          storeFile=$CM_BUILD_DIR/android/keystore/release.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF

      - name: Flutter dependencies
        script: |
          set -e
          flutter --version
          flutter pub get

      - name: Generate native splash screens
        script: |
          set -e
          dart run flutter_native_splash:create

      - name: Build Android App Bundle
        script: |
          set -e
          flutter build appbundle --release --no-tree-shake-icons

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - methnasupport@gmail.com
        notify:
          success: true
          failure: true
      # Uncomment once you've connected the Google Play service account in
      # Codemagic Team integrations and verified the package is published once
      # manually.
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: false
