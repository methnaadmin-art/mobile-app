name: methna_app
description: "Methna - Muslim Dating & Marriage App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # Local Storage
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI & Animation
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Camera & Image
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.4.0
  google_mlkit_face_detection: ^0.11.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  country_picker: ^2.0.27

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Biometric Auth
  local_auth: ^2.3.0

  # Social Auth
  google_sign_in: ^6.2.1

  # Animations & Effects
  confetti: ^0.7.0
  vibration: ^2.0.0

  # Payments
  flutter_stripe: ^12.5.0

  # URL Launcher
  url_launcher: ^6.2.5

  # Utils
  intl: ^0.20.2
  pin_code_fields: ^8.0.1
  flutter_card_swiper: ^7.0.1
  percent_indicator: ^4.2.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  path: ^1.9.0
  lucide_icons: ^0.257.0
  path_provider: ^2.1.2
  http_parser: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/references/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/methna_logo_glow.png"
  min_sdk_android: 24

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/splash_logo.png"
  color_dark: "#121212"
  image_dark: "assets/images/splash_logo.png"
  android_12:
    image: "assets/images/splash_logo.png"
    icon_background_color: "#ffffff"
